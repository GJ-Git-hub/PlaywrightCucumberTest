name: E2E Tests - Playwright + Cucumber

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tags to run (e.g. @smoke)'
        required: false
        default: ''
      browser:
        description: 'Browser to run (chromium/firefox/webkit)'
        required: false
        default: 'chromium'

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start app server
        run: npx serve app -p 3000 &
        env:
          CI: true

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          CI: true
          APP_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-reports
          path: reports/

  regression-tests:
    name: Regression Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: smoke-tests
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests on ${{ matrix.browser }}
        run: npx playwright test --config=playwright.config.js --project=${{ matrix.browser }}
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            reports/playwright-html/
            test-results/

  cucumber-full:
    name: Cucumber BDD Full Suite
    runs-on: ubuntu-latest
    needs: smoke-tests
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start app server
        run: npx serve app -p 3000 &
        env:
          CI: true

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run full Cucumber suite
        run: npm test
        env:
          CI: true
          APP_URL: http://localhost:3000
          TAGS: ${{ github.event.inputs.tags }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-reports
          path: reports/
